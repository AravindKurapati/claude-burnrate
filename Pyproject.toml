[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-budget"
version = "0.1.0"
description = "Track your Claude session + weekly usage. Never waste limits again."
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
  {name = "Aravind Kurapati", email = ""},
]
keywords = ["claude", "anthropic", "usage", "cli", "limits", "budget"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Topic :: Utilities",
]
dependencies = [
  "typer>=0.12",
  "rich>=13",
]

[project.scripts]
claude-budget = "claude_budget.cli:app"

[project.urls]
Homepage = "https://github.com/AravindKurapati/claude-budget"
Issues   = "https://github.com/AravindKurapati/claude-budget/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["claude_budget*"]